<main class="main">
  <div class="tree-container">
    <div class="header">
      <h1>{{ title }}</h1>
      
      <div class="toolbar">
        <button (click)="addRootNode('file')">+ New File</button>
        <button (click)="addRootNode('folder')">+ New Folder</button>
      </div>
    </div>

    <p class="subtitle">Modern file explorer with inline editing and drag & drop</p>

    @if (loading()) {
      <p>Loading tree...</p>
    } @else {
      <app-file-tree 
        [nodes]="nodes()" 
        (treeChanged)="onTreeChanged()">
      </app-file-tree>
    }
  </div>

  <!-- Floating Info Button -->
  <button class="info-fab" (click)="showInfo()" title="About this demo">
    ℹ️
  </button>

  <router-outlet />
</main>
