<main class="main">
  <div class="tree-container">
    <h1>{{ title }}</h1>
    <p>File Tree Explorer with drag and drop (arbitrary depth supported)</p>
    
    @if (loading()) {
      <p>Loading tree...</p>
    } @else {
      <app-file-tree 
        [nodes]="nodes()" 
        (treeChanged)="onTreeChanged()">
      </app-file-tree>
    }
  </div>
  <router-outlet />
</main>
